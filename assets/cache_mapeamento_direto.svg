<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#111"/></marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111; }
      .title { font-size: 28px; font-weight: bold; }
      .label { font-size: 18px; font-weight: bold; }
      .small { font-size: 15px; }
      .box { fill: #fff; stroke: #111; stroke-width: 2; }
      .head { fill: #e9e9e9; stroke: #111; stroke-width: 2; }
      .line { fill: none; stroke: #111; stroke-width: 2; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #111; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="720" fill="white"/>
  <text x="600" y="38" text-anchor="middle" class="title">Cache com mapeamento direto - exemplo de 5 bits</text>

  <text x="55" y="82" class="label">Endereco da memoria principal</text>
  <rect x="55" y="95" width="470" height="75" class="box"/>
  <rect x="55" y="95" width="180" height="75" class="head"/>
  <rect x="235" y="95" width="180" height="75" class="head"/>
  <rect x="415" y="95" width="110" height="75" class="head"/>
  <text x="145" y="125" text-anchor="middle" class="label">TAG</text><text x="145" y="151" text-anchor="middle" class="small">2 bits</text>
  <text x="325" y="125" text-anchor="middle" class="label">LINHA</text><text x="325" y="151" text-anchor="middle" class="small">2 bits</text>
  <text x="470" y="125" text-anchor="middle" class="label">BYTE</text><text x="470" y="151" text-anchor="middle" class="small">1 bit</text>

  <rect x="70" y="255" width="190" height="85" class="box"/>
  <text x="165" y="285" text-anchor="middle" class="label">Decodificador</text>
  <text x="165" y="312" text-anchor="middle" class="small">2 bits - escolhe 1 linha</text>
  <path d="M325 170 L325 210 L165 210 L165 255" class="line"/>

  <rect x="330" y="225" width="535" height="315" class="box"/>
  <rect x="330" y="225" width="535" height="55" class="head"/>
  <line x1="400" y1="225" x2="400" y2="540" stroke="#111" stroke-width="2"/>
  <line x1="505" y1="225" x2="505" y2="540" stroke="#111" stroke-width="2"/>
  <line x1="685" y1="225" x2="685" y2="540" stroke="#111" stroke-width="2"/>
  <line x1="330" y1="280" x2="865" y2="280" stroke="#111" stroke-width="2"/>
  <line x1="330" y1="345" x2="865" y2="345" stroke="#111" stroke-width="2"/>
  <line x1="330" y1="410" x2="865" y2="410" stroke="#111" stroke-width="2"/>
  <line x1="330" y1="475" x2="865" y2="475" stroke="#111" stroke-width="2"/>
  <text x="365" y="260" text-anchor="middle" class="label">V</text>
  <text x="452" y="260" text-anchor="middle" class="label">Tag</text>
  <text x="595" y="260" text-anchor="middle" class="label">Byte 0</text>
  <text x="775" y="260" text-anchor="middle" class="label">Byte 1</text>
  <text x="300" y="320" text-anchor="end" class="label">Linha 0</text>
  <text x="300" y="385" text-anchor="end" class="label">Linha 1</text>
  <text x="300" y="450" text-anchor="end" class="label">Linha 2</text>
  <text x="300" y="515" text-anchor="end" class="label">Linha 3</text>
  <path d="M260 298 L330 298" class="line"/>

  <rect x="60" y="430" width="205" height="90" class="box"/>
  <text x="162" y="463" text-anchor="middle" class="label">Comparador</text>
  <text x="162" y="490" text-anchor="middle" class="small">tag pedida x tag guardada</text>
  <path d="M145 170 L145 430" class="line"/>
  <path d="M400 375 L285 375 L285 475 L265 475" class="line"/>
  <text x="65" y="555" class="label">Acerto (hit)</text>
  <text x="65" y="582" class="small">valida = 1 e tags iguais</text>
  <text x="65" y="615" class="label">Falta (miss)</text>
  <text x="65" y="642" class="small">carrega o bloco da RAM</text>

  <rect x="915" y="300" width="120" height="100" class="box"/>
  <text x="975" y="335" text-anchor="middle" class="label">Seletor</text>
  <text x="975" y="363" text-anchor="middle" class="small">Byte 0 ou 1</text>
  <path d="M865 365 L915 365" class="line"/>
  <path d="M470 170 L470 195 L890 195 L890 330 L915 330" class="line"/>
  <path d="M1035 350 L1145 350" class="bus"/>
  <text x="1160" y="305" text-anchor="end" class="label">Dado para a CPU</text>

  <rect x="925" y="470" width="225" height="160" class="box"/>
  <text x="1038" y="500" text-anchor="middle" class="label">Memoria principal</text>
  <text x="1038" y="528" text-anchor="middle" class="small">32 enderecos de 8 bits</text>
  <text x="1038" y="555" text-anchor="middle" class="small">16 blocos de 2 bytes</text>
  <text x="1038" y="585" text-anchor="middle" class="small">Bloco 0001:</text>
  <text x="1038" y="610" text-anchor="middle" class="small">00010 e 00011</text>
  <path d="M925 535 L865 535" class="bus"/>
  <text x="895" y="560" text-anchor="middle" class="small">bloco</text>

  <text x="600" y="600" text-anchor="middle" class="label">linha = numero do bloco mod 4</text>
  <text x="600" y="630" text-anchor="middle" class="small">Cada bloco so pode ocupar uma das quatro linhas.</text>
  <text x="600" y="670" text-anchor="middle" class="small">V = bit de validade. Em uma falta, os 2 bytes do bloco substituem a linha escolhida.</text>
</svg>

