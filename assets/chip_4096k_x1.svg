<svg xmlns="http://www.w3.org/2000/svg" width="820" height="650" viewBox="0 0 820 650">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111; }
      .title { font-size: 27px; font-weight: bold; }
      .label { font-size: 18px; }
      .center { font-size: 23px; font-weight: bold; }
      .small { font-size: 15px; }
      .chip { fill: #fff; stroke: #111; stroke-width: 3; }
      .pin { stroke: #111; stroke-width: 2; marker-end: url(#arrow); }
      .bidir { stroke: #111; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="820" height="650" fill="white"/>
  <text x="410" y="35" text-anchor="middle" class="title">Chip DRAM 4096 K x 1</text>
  <rect x="300" y="70" width="250" height="470" class="chip"/>

  <text x="425" y="245" text-anchor="middle" class="center">Chip de memoria</text>
  <text x="425" y="280" text-anchor="middle" class="center">4096 K x 1</text>
  <text x="425" y="315" text-anchor="middle" class="center">4 Mbits</text>

  <g class="label">
    <text x="205" y="103">A0</text><line x1="235" y1="98" x2="300" y2="98" class="pin"/>
    <text x="205" y="127">A1</text><line x1="235" y1="122" x2="300" y2="122" class="pin"/>
    <text x="205" y="151">A2</text><line x1="235" y1="146" x2="300" y2="146" class="pin"/>
    <text x="205" y="175">A3</text><line x1="235" y1="170" x2="300" y2="170" class="pin"/>
    <text x="205" y="199">A4</text><line x1="235" y1="194" x2="300" y2="194" class="pin"/>
    <text x="205" y="223">A5</text><line x1="235" y1="218" x2="300" y2="218" class="pin"/>
    <text x="205" y="247">A6</text><line x1="235" y1="242" x2="300" y2="242" class="pin"/>
    <text x="205" y="271">A7</text><line x1="235" y1="266" x2="300" y2="266" class="pin"/>
    <text x="205" y="295">A8</text><line x1="235" y1="290" x2="300" y2="290" class="pin"/>
    <text x="205" y="319">A9</text><line x1="235" y1="314" x2="300" y2="314" class="pin"/>
    <text x="195" y="343">A10</text><line x1="235" y1="338" x2="300" y2="338" class="pin"/>
    <text x="170" y="405">/RAS</text><line x1="235" y1="400" x2="300" y2="400" class="pin"/>
    <text x="170" y="445">/CAS</text><line x1="235" y1="440" x2="300" y2="440" class="pin"/>
  </g>

  <line x1="550" y1="270" x2="650" y2="270" class="bidir"/>
  <text x="670" y="276" class="label">D</text>

  <line x1="355" y1="600" x2="355" y2="540" class="pin"/>
  <line x1="425" y1="600" x2="425" y2="540" class="pin"/>
  <line x1="495" y1="600" x2="495" y2="540" class="pin"/>
  <text x="355" y="625" text-anchor="middle" class="label">/CS</text>
  <text x="425" y="625" text-anchor="middle" class="label">/WE</text>
  <text x="495" y="625" text-anchor="middle" class="label">/OE</text>

  <text x="670" y="375" text-anchor="middle" class="small">11 pinos usados em 2 etapas:</text>
  <text x="670" y="400" text-anchor="middle" class="small">11 bits de linha + 11 de coluna</text>
  <text x="670" y="425" text-anchor="middle" class="small">= 22 bits logicos</text>
</svg>

