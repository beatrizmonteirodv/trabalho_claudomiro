<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111; }
      .title { font-size: 27px; font-weight: bold; }
      .label { font-size: 17px; }
      .center { font-size: 23px; font-weight: bold; }
      .small { font-size: 15px; }
      .chip { fill: #fff; stroke: #111; stroke-width: 3; }
      .pin { stroke: #111; stroke-width: 2; marker-end: url(#arrow); }
      .bidir { stroke: #111; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="900" height="700" fill="white"/>
  <text x="450" y="35" text-anchor="middle" class="title">Chip DRAM 128 M x 4</text>
  <rect x="330" y="70" width="255" height="520" class="chip"/>

  <text x="458" y="255" text-anchor="middle" class="center">Chip de memoria</text>
  <text x="458" y="290" text-anchor="middle" class="center">128 M x 4</text>
  <text x="458" y="325" text-anchor="middle" class="center">512 Mbits</text>

  <g class="label">
    <text x="220" y="98">A0</text><line x1="250" y1="93" x2="330" y2="93" class="pin"/>
    <text x="220" y="118">A1</text><line x1="250" y1="113" x2="330" y2="113" class="pin"/>
    <text x="220" y="138">A2</text><line x1="250" y1="133" x2="330" y2="133" class="pin"/>
    <text x="220" y="158">A3</text><line x1="250" y1="153" x2="330" y2="153" class="pin"/>
    <text x="220" y="178">A4</text><line x1="250" y1="173" x2="330" y2="173" class="pin"/>
    <text x="220" y="198">A5</text><line x1="250" y1="193" x2="330" y2="193" class="pin"/>
    <text x="220" y="218">A6</text><line x1="250" y1="213" x2="330" y2="213" class="pin"/>
    <text x="220" y="238">A7</text><line x1="250" y1="233" x2="330" y2="233" class="pin"/>
    <text x="220" y="258">A8</text><line x1="250" y1="253" x2="330" y2="253" class="pin"/>
    <text x="220" y="278">A9</text><line x1="250" y1="273" x2="330" y2="273" class="pin"/>
    <text x="210" y="298">A10</text><line x1="250" y1="293" x2="330" y2="293" class="pin"/>
    <text x="210" y="318">A11</text><line x1="250" y1="313" x2="330" y2="313" class="pin"/>
    <text x="210" y="338">A12</text><line x1="250" y1="333" x2="330" y2="333" class="pin"/>
    <text x="185" y="405">/RAS</text><line x1="250" y1="400" x2="330" y2="400" class="pin"/>
    <text x="185" y="440">/CAS</text><line x1="250" y1="435" x2="330" y2="435" class="pin"/>
    <text x="160" y="495">Banco 0</text><line x1="250" y1="490" x2="330" y2="490" class="pin"/>
    <text x="160" y="530">Banco 1</text><line x1="250" y1="525" x2="330" y2="525" class="pin"/>
  </g>

  <line x1="585" y1="220" x2="685" y2="220" class="bidir"/><text x="705" y="226" class="label">D0</text>
  <line x1="585" y1="260" x2="685" y2="260" class="bidir"/><text x="705" y="266" class="label">D1</text>
  <line x1="585" y1="300" x2="685" y2="300" class="bidir"/><text x="705" y="306" class="label">D2</text>
  <line x1="585" y1="340" x2="685" y2="340" class="bidir"/><text x="705" y="346" class="label">D3</text>

  <line x1="385" y1="650" x2="385" y2="590" class="pin"/>
  <line x1="458" y1="650" x2="458" y2="590" class="pin"/>
  <line x1="530" y1="650" x2="530" y2="590" class="pin"/>
  <text x="385" y="675" text-anchor="middle" class="label">/CS</text>
  <text x="458" y="675" text-anchor="middle" class="label">/WE</text>
  <text x="530" y="675" text-anchor="middle" class="label">/OE</text>

  <text x="750" y="420" text-anchor="middle" class="small">2 bits selecionam 4 bancos</text>
  <text x="750" y="448" text-anchor="middle" class="small">13 linha + 12 coluna</text>
  <text x="750" y="473" text-anchor="middle" class="small">+ 2 banco = 27 bits</text>
</svg>

