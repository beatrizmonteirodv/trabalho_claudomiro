<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#111"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #111; }
      .title { font-size: 28px; font-weight: bold; }
      .label { font-size: 18px; font-weight: bold; }
      .small { font-size: 15px; }
      .box { fill: #fff; stroke: #111; stroke-width: 2; }
      .bank { fill: #f5f5f5; stroke: #111; stroke-width: 2; }
      .chip { fill: #fff; stroke: #111; stroke-width: 2; }
      .line { fill: none; stroke: #111; stroke-width: 2; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #111; stroke-width: 4; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="white"/>
  <text x="550" y="38" text-anchor="middle" class="title">Projeto 1 - memoria de 8 Gbits</text>

  <rect x="55" y="75" width="430" height="70" class="box"/>
  <line x1="365" y1="75" x2="365" y2="145" stroke="#111" stroke-width="2"/>
  <text x="210" y="103" text-anchor="middle" class="label">26 bits internos</text>
  <text x="210" y="128" text-anchor="middle" class="small">13 pinos: linha por RAS + coluna por CAS</text>
  <text x="425" y="103" text-anchor="middle" class="label">1 bit</text>
  <text x="425" y="128" text-anchor="middle" class="small">seleciona banco</text>
  <text x="55" y="168" class="small">Barramento logico: 27 bits</text>

  <rect x="55" y="255" width="150" height="80" class="box"/>
  <text x="130" y="285" text-anchor="middle" class="label">Seletor</text>
  <text x="130" y="312" text-anchor="middle" class="small">1 bit - 2 bancos</text>
  <path d="M425 145 L425 220 L130 220 L130 255" class="line"/>

  <path d="M210 145 L210 190 L1000 190" class="bus"/>
  <text x="690" y="181" text-anchor="middle" class="small">enderecos internos compartilhados</text>

  <rect x="255" y="215" width="690" height="170" rx="8" class="bank"/>
  <text x="275" y="242" class="label">Banco 0 - 4 Gbits</text>
  <rect x="290" y="265" width="135" height="85" class="chip"/>
  <rect x="450" y="265" width="135" height="85" class="chip"/>
  <rect x="610" y="265" width="135" height="85" class="chip"/>
  <rect x="770" y="265" width="135" height="85" class="chip"/>
  <text x="358" y="298" text-anchor="middle" class="label">64 M x 16</text><text x="358" y="325" text-anchor="middle" class="small">1 Gbit</text>
  <text x="518" y="298" text-anchor="middle" class="label">64 M x 16</text><text x="518" y="325" text-anchor="middle" class="small">1 Gbit</text>
  <text x="678" y="298" text-anchor="middle" class="label">64 M x 16</text><text x="678" y="325" text-anchor="middle" class="small">1 Gbit</text>
  <text x="838" y="298" text-anchor="middle" class="label">64 M x 16</text><text x="838" y="325" text-anchor="middle" class="small">1 Gbit</text>
  <path d="M205 280 L255 280" class="line"/>

  <rect x="255" y="420" width="690" height="170" rx="8" class="bank"/>
  <text x="275" y="447" class="label">Banco 1 - 4 Gbits</text>
  <rect x="290" y="470" width="135" height="85" class="chip"/>
  <rect x="450" y="470" width="135" height="85" class="chip"/>
  <rect x="610" y="470" width="135" height="85" class="chip"/>
  <rect x="770" y="470" width="135" height="85" class="chip"/>
  <text x="358" y="503" text-anchor="middle" class="label">64 M x 16</text><text x="358" y="530" text-anchor="middle" class="small">1 Gbit</text>
  <text x="518" y="503" text-anchor="middle" class="label">64 M x 16</text><text x="518" y="530" text-anchor="middle" class="small">1 Gbit</text>
  <text x="678" y="503" text-anchor="middle" class="label">64 M x 16</text><text x="678" y="530" text-anchor="middle" class="small">1 Gbit</text>
  <text x="838" y="503" text-anchor="middle" class="label">64 M x 16</text><text x="838" y="530" text-anchor="middle" class="small">1 Gbit</text>
  <path d="M205 315 L230 315 L230 485 L255 485" class="line"/>

  <path d="M945 300 L1000 300 L1000 505 L945 505" class="bus"/>
  <path d="M1000 402 L1060 402" class="line"/>
  <text x="1070" y="385" text-anchor="end" class="label">BD = 64 bits</text>
  <text x="1070" y="425" text-anchor="end" class="small">2 palavras de 32 bits</text>

  <text x="550" y="635" text-anchor="middle" class="label">2 bancos x 4 chips = 8 chips = 8 Gbits</text>
  <text x="550" y="665" text-anchor="middle" class="small">Apenas o banco selecionado usa o barramento de dados.</text>
</svg>

